services:
  # Y-Sweet CRDT sync server
  y-sweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    environment:
      - SESSION_BACKEND_KEY=${SESSION_BACKEND_KEY:-dev-key-change-in-production-use-openssl-rand-base64-32}
      - YSWEET_STORAGE_PATH=/data
    volumes:
      - y-sweet-data:/data
    command: ["y-sweet", "serve", "--host", "0.0.0.0", "--port", "8091"]
    restart: unless-stopped
    networks:
      - backend-network
    # Only expose internally (nginx will proxy)
    expose:
      - "8091"

  # Token generation server
  token-server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    environment:
      - PORT=8092
      # Connect to Y-Sweet service in Docker network
      - YSWEET_URL=http://y-sweet:8091
      # Document ID for all clients (single-user setup)
      - DOCUMENT_ID=${DOCUMENT_ID:-tasky-main}
      # Note: Client WebSocket URL is auto-detected from incoming request headers
    depends_on:
      y-sweet:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend-network
    # Only expose internally (nginx will proxy)
    expose:
      - "8092"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://y-sweet:8091/doc/new', (r) => process.exit(r.statusCode === 405 ? 0 : 1))",
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Nginx reverse proxy (single entry point)
  nginx:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./packages/server/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - y-sweet
      - token-server
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  y-sweet-data:

networks:
  backend-network:
    driver: bridge
