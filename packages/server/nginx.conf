events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Upstream servers
    upstream token_server {
        server token-server:8092;
    }

    upstream ysweet_server {
        server y-sweet:8091;
    }

    server {
        listen 8080;
        server_name _;

        # Global CORS headers for all responses
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Token endpoint - proxy to token server
        location /token {
            # Handle OPTIONS preflight before proxying
            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://token_server/token;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Hide CORS headers from backend (we handle them globally)
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
        }

        # WebSocket endpoint - proxy to Y-Sweet
        # Y-Sweet uses /d/<doc-id>/ws for WebSocket connections
        location /d/ {
            proxy_pass http://ysweet_server;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts (keep connection alive)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Y-Sweet management API (optional, for doc creation/management)
        location /doc/ {
            proxy_pass http://ysweet_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Root - return basic info
        location = / {
            return 200 '{"service":"tasky-backend","endpoints":["/token","/d/<doc-id>/ws","/health"]}\n';
            add_header Content-Type application/json;
        }
    }
}
