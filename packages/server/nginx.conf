# Nginx reverse proxy configuration for Tasky sync backend
# Proxies HTTP requests to token server and WebSocket connections to Y-Sweet

upstream token_server {
    server token-server:8092;
}

upstream y_sweet {
    server y-sweet:8091;
}

server {
    listen 8093;
    server_name _;

    # Proxy token server endpoints
    # Note: Token server handles CORS headers, so we don't add them here to avoid duplicates
    location = /token {
        proxy_pass http://token_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy token server health check
    location = /health {
        proxy_pass http://token_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Y-Sweet WebSocket connections
    # Y-Sweet uses paths like /d/doc-id/ws for WebSocket connections
    location / {
        proxy_pass http://y_sweet;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

