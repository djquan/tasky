version: "3.8"

services:
  y-sweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    # Keep port exposed for backward compatibility, but nginx is the recommended way
    ports:
      - "1234:8091" # Map host:1234 to container:8091 (Y-Sweet's default port)
    environment:
      - YSWEET_STORAGE_PATH=/data
      # Generate a secure key with: openssl rand -base64 32
      # For development, using a fixed key. CHANGE THIS IN PRODUCTION!
      - SESSION_BACKEND_KEY=dev-key-change-in-production-use-openssl-rand-base64-32
    volumes:
      - y-sweet-data:/data
    restart: unless-stopped
    networks:
      - tasky-network

  token-server:
    build: .
    # Keep port exposed for backward compatibility, but nginx is the recommended way
    ports:
      - "8092:8092"
    environment:
      - PORT=8092
      # Internal URL for token server to connect to Y-Sweet (Docker network)
      - YSWEET_URL=http://y-sweet:8091
      # Client URL through nginx proxy (recommended)
      # Can be overridden via environment variable for different setups
      - YSWEET_CLIENT_URL=${YSWEET_CLIENT_URL:-ws://localhost:8093}
      - DOCUMENT_ID=${DOCUMENT_ID:-tasky-main}
    depends_on:
      - y-sweet
    restart: unless-stopped
    networks:
      - tasky-network

  nginx:
    image: nginx:alpine
    ports:
      - "8093:8093"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - token-server
      - y-sweet
    restart: unless-stopped
    networks:
      - tasky-network

volumes:
  y-sweet-data:

networks:
  tasky-network:
    driver: bridge

