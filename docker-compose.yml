services:
  nginx:
    image: nginx:alpine
    ports:
      - "8093:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - token-server
      - y-sweet
    networks:
      - tasky-network
    restart: unless-stopped

  y-sweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    # Ports removed to keep internal only
    environment:
      - SESSION_BACKEND_KEY=${SESSION_BACKEND_KEY:-dev-key-change-in-production-use-openssl-rand-base64-32}
      - YSWEET_STORAGE_PATH=/data
    volumes:
      - y-sweet-data:/data
    # Override default command to use 'serve' instead of 'serve-doc' to expose HTTP management API
    command: ["y-sweet", "serve", "--host", "0.0.0.0", "--port", "8091"]
    restart: unless-stopped
    networks:
      - tasky-network

  token-server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    # Ports removed to keep internal only
    environment:
      - PORT=8092
      # Connect to Y-Sweet service in Docker network
      - YSWEET_URL=${YSWEET_URL:-http://y-sweet:8091}
      - DOCUMENT_ID=${DOCUMENT_ID:-tasky-main}
    depends_on:
      y-sweet:
        condition: service_started
    restart: unless-stopped
    networks:
      - tasky-network
    # Add a small delay to ensure Y-Sweet is fully ready
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://y-sweet:8091/doc/new', (r) => process.exit(r.statusCode === 405 ? 0 : 1))",
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    ports:
      - "8090:80"
    restart: unless-stopped
    networks:
      - tasky-network

volumes:
  y-sweet-data:

networks:
  tasky-network:
    driver: bridge
