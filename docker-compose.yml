services:
  y-sweet:
    image: ghcr.io/jamsocket/y-sweet:latest
    ports:
      - "8091:8091"
    environment:
      - SESSION_BACKEND_KEY=${SESSION_BACKEND_KEY:-dev-key-change-in-production-use-openssl-rand-base64-32}
      - YSWEET_STORAGE_PATH=/data
    volumes:
      - y-sweet-data:/data
    # Override default command to use 'serve' instead of 'serve-doc' to expose HTTP management API
    command: ["y-sweet", "serve", "--host", "0.0.0.0", "--port", "8091"]
    restart: unless-stopped
    networks:
      - tasky-network

  token-server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    # Keep port exposed for backward compatibility, but nginx is the recommended way
    ports:
      - "8092:8092"
    environment:
      - PORT=8092
      # Connect to Y-Sweet service in Docker network
      - YSWEET_URL=${YSWEET_URL:-http://y-sweet:8091}
      # Client URL through nginx proxy (recommended)
      # Can be overridden via environment variable for different setups
      - YSWEET_CLIENT_URL=${YSWEET_CLIENT_URL:-ws://localhost:8093}
      - DOCUMENT_ID=${DOCUMENT_ID:-tasky-main}
    depends_on:
      y-sweet:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped
    networks:
      - tasky-network
    # Add a small delay to ensure Y-Sweet is fully ready
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://y-sweet:8091/doc/new', (r) => process.exit(r.statusCode === 405 ? 0 : 1))",
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  nginx:
    image: nginx:alpine
    ports:
      - "8093:8093"
    volumes:
      - ./packages/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - token-server
      - y-sweet
    restart: unless-stopped
    networks:
      - tasky-network

  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    ports:
      - "8090:80"
    restart: unless-stopped
    networks:
      - tasky-network

volumes:
  y-sweet-data:

networks:
  tasky-network:
    driver: bridge
