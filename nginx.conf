events {
    worker_connections 1024;
}

http {
    # Map to set Connection header to "Upgrade" only when Upgrade header is present
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream token_server {
        server token-server:8092;
    }

    upstream y_sweet {
        server y-sweet:8091;
    }

    server {
        listen 80;

        # Proxy /token requests to the token server
        location /token {
            proxy_pass http://token_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy everything else (including WebSockets) to Y-Sweet
        location / {
            proxy_pass http://y_sweet;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
